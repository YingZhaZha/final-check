<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Aircraft Final Inspection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', '"Noto Sans SC"', 'sans-serif'],
            },
            colors: {
              aviation: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                900: '#0c4a6e',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', 'Noto Sans SC', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        overscroll-behavior-y: contain;
      }
      .tabs-container {
        display: flex;
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        width: 300%;
      }
      .tab-pane {
        width: 33.333%;
        flex-shrink: 0;
      }
      
      @keyframes pulse-red-bg {
        0% { background-color: rgba(239, 68, 68, 0); }
        50% { background-color: rgba(239, 68, 68, 0.12); }
        100% { background-color: rgba(239, 68, 68, 0); }
      }
      @keyframes pulse-red-dot {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.8); opacity: 0; }
        100% { transform: scale(1); opacity: 0; }
      }
      
      .animate-pulse-red-bg {
        animation: pulse-red-bg 4s infinite ease-in-out;
      }
      .animate-pulse-red-dot {
        animation: pulse-red-dot 4s infinite ease-in-out;
      }

      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      input[type=number] {
        -moz-appearance: textfield;
      }
      
      /* Full screen signature fix */
      .sig-canvas-container canvas {
        width: 100% !important;
        height: 100% !important;
        touch-action: none;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "jspdf": "https://esm.sh/jspdf@^3.0.4",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "react-webcam": "https://esm.sh/react-webcam@^7.2.0",
    "date-fns": "https://esm.sh/date-fns@^4.1.0",
    "react-signature-canvas": "https://esm.sh/react-signature-canvas@^1.1.0-alpha.2",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>
  </head>
  <body class="bg-slate-100 text-slate-900 antialiased selection:bg-blue-100 selection:text-blue-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
